<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Velvet Crust</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: var(--off-white); display: flex; justify-content: center; align-items: center; height: 100vh;">
    <div style="background: white; padding: 60px; width: 100%; max-width: 400px; border: 1px solid var(--border-light);">
        <div class="logo" style="text-align: center; margin-bottom: 40px;">Velvet Crust</div>
        <input type="email" placeholder="Email" style="width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border-light); box-sizing: border-box;">
        <input type="password" placeholder="Password" style="width: 100%; padding: 15px; margin-bottom: 30px; border: 1px solid var(--border-light); box-sizing: border-box;">
        <button class="btn-cream" style="width: 100%; padding: 15px;">Sign In</button>
        <div style="text-align: center; margin-top: 30px;">
            <a href="index.html" style="color: #999; text-decoration: none; font-size: 0.8rem;">← Back to Home</a>
        </div>
    </div>
</body>
</html>
