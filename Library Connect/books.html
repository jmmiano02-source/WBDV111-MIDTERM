<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LibraryConnect - Loan Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="logo">LibrarianConnect</div>
        <div class="nav-links">
            <a href="library.html">Home</a>
            <a href="members.html">Members</a>
            <a href="loans.html">Loans</a>
            <a href="books.html">Books</a>
        </div>
    </div>

    <section class="loan-page">
        <h1>Loan a Book</h1>
        <div class="loan-form-box" style="max-width: 500px; margin: 0 auto;">
            <form>
                <label>Member Name</label>
                <input type="text" placeholder="Enter name">
                <label>Book Title</label>
                <input type="text" placeholder="Enter book title">
                <label>Due Date</label>
                <input type="date">
                <button type="submit" style="width: 100%;">Record Loan</button>
            </form>
        </div>
    </section>
</body>
</html>
