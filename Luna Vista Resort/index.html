<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna Vista | Home</title>
  <link href="https://fonts.googleapis.com" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">Luna Vista<span>Resort</span></a>
    <nav>
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="reservation.html" class="nav-cta">Book Now</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero">
    <video class="hero-video" autoplay muted loop playsinline poster="https://images.unsplash.com">
      <source src="https://cdn.coverr.co" type="video/mp4">
    </video>
    <div class="hero-shade"></div>

    <section class="login-card">
      <div class="card-header">
        <h1>Welcome Luna's</h1>
        <p>Start with us by Login in.</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="field-group">
          <label for="email">Email Address</label>
          <input id="email" type="email" placeholder="name@domain.com" required>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="login-btn">
          <span>Sign In</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M5 12h14M12 5l7 7-7 7""")/>>
          </svg>
        </button>
      </form>
      <a href="#" class="forgot-link">Forgot password?</a>
    </section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Luna Vista Resort. Designed by Jeem Inc.</p>
  </footer>


  <script src="script.js"></script>
</body>
</html>
