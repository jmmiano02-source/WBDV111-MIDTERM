<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftCart - Cart</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav>
    <div class="container nav-container">
      <div class="logo">SwiftCart</div>
      <ul class="nav-links">
        <li><a href="index.html">Catalog</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="status.html">Status</a></li>
        <li id="admin-link" style="display:none;"><a href="admin.html">Dashboard</a></li>
      </ul>
      <div>
        <span id="user-role" style="margin-right: 1rem; font-weight: 500; display:none;"></span>
        <button id="logout-btn" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; display:none;" onclick="logout()">Logout</button>
        <div class="cart-icon">🛒
          <span class="cart-badge" style="display:none;">0</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1 style="margin: 2rem 0;">Your Cart</h1>
    
    <div style="display: grid; grid-template-columns: 1fr 350px; gap: 3rem;">
      <div id="cart-items">
      </div>
      
      <div class="order-summary" id="order-summary">
      </div>
    </div>
    
    <div style="text-align: center; margin-top: 2rem;">
      <a href="checkout.html" class="btn" style="font-size: 1.2rem; padding: 1rem 2rem;" id="proceed-btn">Proceed to Checkout</a>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
