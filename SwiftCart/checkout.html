<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftCart - Checkout</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav>
    <div class="container nav-container">
      <div class="logo">SwiftCart</div>
      <ul class="nav-links">
        <li><a href="index.html">Catalog</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="status.html">Status</a></li>
        <li id="admin-link" style="display:none;"><a href="admin.html">Dashboard</a></li>
      </ul>
      <div>
        <span id="user-role" style="margin-right: 1rem; font-weight: 500; display:none;"></span>
        <button id="logout-btn" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; display:none;" onclick="logout()">Logout</button>
        <div class="cart-icon">🛒
          <span class="cart-badge" style="display:none;">0</span>
        </div>
      </div>
    </nav>

  <div class="container">
    <h1 style="margin: 2rem 0;">Checkout</h1>
    
    <div class="checkout-section">
      <div>
        <form id="checkout-form">
          <h3>Shipping Information</h3>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" required>
          </div>
          <div class="form-group">
            <label>Address</label>
            <textarea rows="3" required></textarea>
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" required>
          </div>
          <div class="form-group">
            <label>ZIP Code</label>
            <input type="text" required>
          </div>
          
          <h3>Payment Details</h3>
          <div class="form-group">
            <label>Card Number</label>
            <input type="text" placeholder="1234 5678 9012 3456" required>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label>Expiry</label>
              <input type="text" placeholder="MM/YY" required>
            </div>
            <div class="form-group">
              <label>CVV</label>
              <input type="text" placeholder="123" required>
            </div>
          </div>
          
          <div class="secure-indicator">
            🔒 Secure Checkout
          </div>
          
          <button type="submit" class="btn" style="width: 100%; font-size: 1.2rem; margin-top: 1rem;">Place Order</button>
        </form>
      </div>

      <div class="order-summary">
        <h3>Order Summary</h3>
        <div id="checkout-summary">
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCart();
      const summary = document.getElementById('checkout-summary');
      if (summary) {
        const subtotal = getCartTotal();
        const shipping = 9.99;
        const tax = subtotal * 0.08;
        const total = subtotal + shipping + tax;
        summary.innerHTML = `
          <div class="summary-row"><span>Items: ${cart.reduce((sum, i) => sum + i.quantity, 0)}</span></div>
          <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>$${shipping.toFixed(2)}</span></div>
          <div class="summary-row"><span>Tax</span><span>$${tax.toFixed(2)}</span></div>
          <hr>
          <div class="summary-row" style="font-size:1.2rem; font-weight:bold;"><span>Total</span><span>$${total.toFixed(2)}</span></div>
        `;
      }
    });
  </script>
</body>
</html>
