<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftCart - Catalog</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <div class="logo">SwiftCart</div>
      <ul class="nav-links">
        <li><a href="index.html">Catalog</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="status.html">Status</a></li>
        <li id="admin-link" style="display:none;"><a href="admin.html">Dashboard</a></li>
      </ul>
      <div>
        <span id="user-role" style="margin-right: 1rem; font-weight: 500; display:none;"></span>
        <button id="logout-btn" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; display:none;" onclick="logout()">Logout</button>
        <div class="cart-icon">🛒
          <span class="cart-badge" style="display:none;">0</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <input type="text" class="search-bar" placeholder="Search products...">

    <div style="display: grid; grid-template-columns: 250px 1fr; gap: 2rem; margin-top: 2rem;">
      
      <div class="sidebar">
        <div class="filter-group">
          <h4>Categories</h4>
          <label><input type="radio" name="category" value="all" checked> All</label>
          <label><input type="radio" name="category" value="Electronics"> Electronics</label>
          <label><input type="radio" name="category" value="Clothing"> Clothing</label>
          <label><input type="radio" name="category" value="Accessories"> Accessories</label>
        </div>
      </div>

      <div>
        <div class="product-grid" id="product-grid">
        </div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = products.map(p => `
        <div class="product-card">
          <img class="product-image" src="${p.image}" alt="${p.name}" onerror="this.style.background='#F3F4F6'">
          <div class="product-info">
            <h3>${p.name}</h3>
            <div class="product-price">$${p.price}</div>
            <div class="stars">★★★★☆</div>
            <button class="btn" onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.image}')">Add to Cart</button>
          </div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>
