<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftCart - Login</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="split-screen">

    <div class="login-hero">
      <h1 class="hero-tagline"></h1>
    </div>

    <div class="login-form-container">
      <div class="login-card">
        <div class="login-tabs">
          <button class="tab-btn active" onclick="switchTab('user')">User Login</button>
          <button class="tab-btn" onclick="switchTab('admin')">Admin Login</button>
        </div>
        
        <h2 id="login-title" style="margin-bottom: 2rem; text-align: center;">User Login</h2>
        
        <form id="user-form" class="form-section active">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="user-email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="user-password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem;">Sign In as User</button>
        </form>
        
        <form id="admin-form" class="form-section">
          <div class="form-group">
            <label>Admin Email</label>
            <input type="email" id="admin-email" placeholder="Admin Login" required>
          </div>
          <div class="form-group">
            <label>Admin Password</label>
            <input type="password" id="admin-password" placeholder="Admin Password" required>
          </div>
          <button type="submit" class="btn" style="width: 100%; font-size: 1.1rem;">Sign In as Admin</button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      document.querySelectorAll('.form-section').forEach(form => form.classList.remove('active'));
      document.getElementById(tab + '-form').classList.add('active');
      document.getElementById('login-title').textContent = tab === 'user' ? 'User Login' : 'Admin Login';
    }

    document.getElementById('user-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('user-email').value;
      const password = document.getElementById('user-password').value;
      login(email, password, 'user');
      window.location.href = 'index.html';
    });

    document.getElementById('admin-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('admin-email').value;
      const password = document.getElementById('admin-password').value;
      const role = login(email, password, 'admin');
      if (role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        alert('Invalid admin credentials!');
      }
    });
  </script>
  
  
</body>
