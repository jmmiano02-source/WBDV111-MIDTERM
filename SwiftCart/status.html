<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwiftCart - Order Status</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav>
    <div class="container nav-container">
      <div class="logo">SwiftCart</div>
      <ul class="nav-links">
        <li><a href="index.html">Catalog</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="checkout.html">Checkout</a></li>
        <li><a href="status.html">Status</a></li>
        <li id="admin-link" style="display:none;"><a href="admin.html">Dashboard</a></li>
      </ul>
      <div>
        <span id="user-role" style="margin-right: 1rem; font-weight: 500; display:none;"></span>
        <button id="logout-btn" class="btn" style="padding: 0.5rem 1rem; font-size: 0.9rem; display:none;" onclick="logout()">Logout</button>
        <div class="cart-icon">🛒
          <span class="cart-badge" style="display:none;">0</span>
        </div>
      </div>
    </div>
  </nav>

  <div class="container">
    <h1 style="margin: 2rem 0;">Order Status #214</h1>
    
    <div class="progress-tracker">
      <div class="step">
        <div style="width: 32px; height: 32px; border-radius: 50%; background: #F97316; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">✓</div>
        <span>Ordered</span>
      </div>
      
      <div class="step completed">
        <div style="width: 32px; height: 32px; border-radius: 50%; background: #10B981; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">✓</div>
        <span>Shipped</span>
        <small>Tracking: IOFPFHUSY2</small>
      </div>
      
      <div class="step">
        <div style="width: 32px; height: 32px; border-radius: 50%; background: #F3F4F6; border: 2px solid #F3F4F6;"></div>
        <span>Out for Delivery</span>
      </div>
      
      <div class="step">
        <div style="width: 32px; height: 32px; border-radius: 50%; background: #F3F4F6; border: 2px solid #F3F4F6;"></div>
        <span>Delivered</span>
      </div>
      
      <div class="progress-bar">
        <div class="progress-fill" style="width: 50%;"></div>
      </div>
      
      <p style="margin-top: 1rem;"><strong>EST DELIVERY:</strong> Tomorrow, NOV 2</p>
    </div>

    <div class="order-summary" style="margin-top: 3rem;">
      <h3>Order Summary</h3>
      <div class="summary-row"><span>Subtotal</span><span>$678.97</span></div>
      <div class="summary-row"><span>Shipping</span><span>$9.99</span></div>
      <div class="summary-row"><span>Tax</span><span>$9.92</span></div>
      <hr>
      <div class="summary-row" style="font-size:1.2rem; font-weight:bold;"><span>Total</span><span>$278.88</span></div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
