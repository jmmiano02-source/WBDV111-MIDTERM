<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Explore - Xeii's Music</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <a href="home.html" class="logo"><h2>Xeii's Music</h2></a>
        <div class="search-container">
            <input type="text" placeholder="Search songs, albums, artists">
            <button>🔍</button>
        </div>
    </div>

    <div class="main">
        <div class="outer-left">
            <a href="home.html">Home</a>
            <a href="explore.html">Explore</a>
            <a href="library.html">Library</a>
        </div>

        <div class="center">
            <h1>Explore</h1>
            <div class="explore-grid">
                <div class="category-card" style="background: #E8115B;">Pop</div>
                <div class="category-card" style="background: #148A08;">Hip-Hop</div>
                <div class="category-card" style="background: #BC5900;">Rock</div>
                <div class="category-card" style="background: #056952;">Indie</div>
            </div>

            <h2 style="margin-top: 40px;">New Releases</h2>
            <div class="music-grid">
                <div class="music-card">
                    <img src="cover.jpg" alt="Cover">
                    <div class="title">Just</div>
                    <div class="artist">Radiohead</div>
                </div>
                </div>
        </div>
    </div>
</body>
</html>
