<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" type="text/css" href="style.css">
<title>Xeii's Music</title>
<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #120D0D;
    color: white;
    padding-bottom: 100px; 
}

.header {
    height: 75px;
    display: flex;
    align-items: center;
    padding: 0 30px;
    background: #181818;
    gap: 20px;
}

.header .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-size: 24px;
}

.header .logo:hover {
    color: white;
}

.search-container {
    flex: 1;                 
    max-width: 500px;      
    margin: 0 auto;       
    display: flex;
    background-color: #D9D4D4;
    border-radius: 30px;
    overflow: hidden;
}

.search-container input {
    flex: 1;
    padding: 12px 20px;
    border: none;
    outline: none;
    background: transparent;
    color: white;
    font-size: 16px;
}

.search-container button {
    background-color: #D9D4D4;
    border: none;
    color: white;
    padding: 0 20px;
    cursor: pointer;
}

.main {
    display: flex;
    margin-top: 20px;
    gap: 20px;
}

.outer-left {
    width: 200px;
    background: #1e1e1e;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 15px;
    height: calc(100vh - 75px); /* full height minus header */
}

.outer-left a {
    text-decoration: none;
    color: white;
    font-size: 16px;
    padding: 10px 15px;
    border-radius: 6px;
    transition: background 0.2s;
}

.outer-left a:hover {
    background: #333;
}

.logo {
    display: flex;
    align-items: center;
    gap: 8px; 
    text-decoration: none;
    color: white;
    font-size: 24px;
}

.logo-img {
    height: 50px;   
    width: auto;
}

.user-profile {
    margin-left: auto; 
}

.user-profile img {
    width: 40px;
    height: 40px;
    border-radius: 50%;   
    object-fit: cover;
    cursor: pointer;
    border: 2px solid #333;
    transition: transform 0.2s;
}

.user-profile img:hover {
    transform: scale(1.05);
}

/* LOGIN CONTAINER */
.login-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 75px);
}

/* MAIN CARD */
.login-card {
    background: #1e1e1e;
    padding: 40px 30px;
    border-radius: 16px;
    width: 350px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    text-align: center;
    position: relative;
}

/* Simple layered effect (clean, not messy) */
.login-card::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 12px;
    width: 100%;
    height: 100%;
    background: #2a2a2a;
    border-radius: 16px;
    z-index: -1;
}

/* Title */
.login-card h1 {
    margin-bottom: 25px;
}

/* Inputs */
.input-group {
    margin-bottom: 18px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    background: #D9D4D4;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 14px;
    outline: none;
}

/* Button */
.login-btn {
    width: 100%;
    padding: 12px;
    background: #800B0B;
    border: none;
    border-radius: 30px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

.login-btn:hover {
    background: #FF0000;
}

/* Footer */
.footer-links {
    margin-top: 20px;
    font-size: 13px;
    color: #800B0B;
}

.footer-links a {
    color: #800B0B;
    text-decoration: none;
}

.footer-links a:hover {
    text-decoration: underline;
}

.divider {
    height: 1px;
    background: #800B0B;
    margin: 10px 0;
}
</style>
</head>
<body>

<div class="header">
   <a href="home.html" class="logo">
        <img src="logo.png" class="logo-img">
        <span>Xeii's Music</span>
    </a>


    <div class="search-container">
        <input type="text" placeholder="Search songs, albums, artists">
        <button>🔍</button>
    </div>

    <div class="user-profile">
        <a href="login.html"><img src="user.png" alt="User"></a>
    </div>
</div>


<div class="main">

    <div class="login-container">
       <div class="login-card">
    <h1>Login</h1>

    <form>
        <div class="input-group">
            <input type="email" placeholder="Email Address" required>
        </div>
        
        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>
        
        <a href="home.html"><button type="submit" class="login-btn">Sign In</button></a>
        
        <div class="footer-links">
            <a href="#">Forgot Password?</a>
            <div class="divider"></div>
            <span>New here? <a href="register.html">Register</a></span>
        </div>
    </form>
    </div>
    </div>
    
</div>

</body>
</html>
